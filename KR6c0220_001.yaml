body:
  text: 西天譯經三藏朝奉大夫試鴻臚卿傳法大師臣施護奉詔譯爾時世尊告尊者舍利子言汝今當知諸有菩薩摩訶薩樂欲修習般若波羅蜜多相應行者當於諸法如實了知諸有所作離一切相是時尊者舍利子合掌恭敬前白佛言世尊如世尊言諸有菩薩摩訶薩樂欲修習般若波羅蜜多相應行者云何了知諸法自性於諸所作云何離相佛言舍利子若諸菩薩摩訶薩樂欲圓滿相應勝行及於諸法離所作相者當了諸法住無所住即能圓滿相應勝行復次舍利子若諸菩薩摩訶薩於諸法中行施行者無能施無所施施無所得若如是者即能圓滿施波羅蜜又復修習諸戒法者無能持無所持無起作若如是者即能圓滿戒波羅蜜又復修習忍辱法者於諸法中無所動轉離諸起作若如是者即能圓滿忍波羅蜜又復當於相應行中精進修習若身若心無有懈倦無起作相若如是者即能圓滿精進波羅蜜又復於諸法中無有散亂離所得相若如是者即能圓滿定波羅蜜舍利子若諸菩薩摩訶薩樂欲安住般若波羅蜜多相應者應當圓滿四念處四正斷四神足五根五力七覺支八正道法又復觀想空三摩地無相三摩地無願三摩地四禪定法四無量法四無色定法八解脫法九先行法九想法何名九想所謂內法想尾布野迦想離赤想離青想尾佉禰多想無住想離散想無熱惱想離飲食想如是名為九想法又復念佛想念法想念僧想念戒施天等想離煩惱想念生滅想念無常苦無我等想念諸世間不究竟想念苦智想集智想滅智想道智想盡智想無生智想法智想無我智想和合智想如實智想語言分別想離語言分別想未知當知根想已知根想具知根想不淨想清淨想奢摩他毗鉢舍那想三明想四了知想四無畏想五神通想六波羅蜜想七種住心想八大人法想九衆生住想如來十力想十八不共法想大慈想大悲想乃至一切智智想於如是等法當作如是想又復諸菩薩摩訶薩樂欲圓滿一切智一切種智者當於般若波羅蜜多如實觀想又復若欲圓滿道相智一切相智了達一切衆生心行相等斷除一切衆生諸雜染者應當修習般若波羅蜜多相應勝行舍利子如我上説諸法想門菩薩摩訶薩當如是學爾時尊者舍利子復白佛言世尊諸菩薩摩訶薩修般若波羅蜜多者當斷何法佛言舍利子修般若波羅蜜多者應當斷除十種疑惑何等為十所謂有性疑無性疑諸法差別疑毀謗疑一法疑多法疑同異疑上品疑如名疑如名義疑此等十疑應當除斷若如是者即菩薩摩訶薩於一切相悉無所觀以相無所觀故名亦無所觀般若波羅蜜多亦無所觀諸行無所觀色無所觀受想行識皆無所觀何以故色自性空空離性故色體即空離色無別空空體即色離空無別色是義云何名分別故舍利子當知色法自性不生不滅非染非淨彼名自性亦非緣法離諸疑惑無所從來亦無所住如實所生離三際故色法如是受想行識亦復如是是故菩薩摩訶薩於諸名相皆無所觀以無所觀故而無所入無所入者即能圓滿般若波羅蜜多相應勝行
